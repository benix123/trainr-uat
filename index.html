<body>

  <script>
  (()=>{
    const app=document.getElementById('app');
    const scenarioDefaults={name:'Ben',email:'ben@trafford.example',sport:'Netball',team:'Trafford A',age:'25–34',experience:'Some experience',teamDays:['Tuesday','Thursday'],gymSessions:'3 sessions',gymDays:['Monday','Wednesday','Friday'],duration:'50–60 mins',equipment:'Commercial Gym',goal:'Build Resilience'};
    const scenario={...scenarioDefaults,teamDays:[...scenarioDefaults.teamDays],gymDays:[...scenarioDefaults.gymDays]};
    const fixtures=[{date:'18 Jul',opponent:'Leeds',home:'Home',time:'11:30',venue:'Trafford Sports Centre',competition:'North West Regional League',selected:true},{date:'25 Jul',opponent:'Oldham',home:'Away',time:'14:00',venue:'',competition:'North West Regional League',selected:true},{date:'1 Aug',opponent:'Stockport',home:'Home',time:'12:15',venue:'Trafford Sports Centre',competition:'North West Regional League',selected:true}];
    const workoutDefaults=[{name:'Back Squat',sets:4,reps:4,weight:90,rest:180,substitutes:[{name:'Goblet Squat',sets:3,reps:8,weight:24,rest:90},{name:'Leg Press',sets:3,reps:8,weight:100,rest:120}]},{name:'Romanian Deadlift',sets:3,reps:6,weight:70,rest:150,substitutes:[{name:'Dumbbell RDL',sets:3,reps:8,weight:24,rest:120},{name:'Hip Thrust',sets:3,reps:8,weight:70,rest:120}]},{name:'Rear-Foot Elevated Split Squat',sets:3,reps:6,weight:24,rest:120,substitutes:[{name:'Reverse Lunge',sets:3,reps:8,weight:20,rest:90},{name:'Step Up',sets:3,reps:8,weight:18,rest:90}]},{name:'Standing Calf Raise',sets:3,reps:10,weight:50,rest:75,substitutes:[{name:'Seated Calf Raise',sets:3,reps:12,weight:40,rest:60},{name:'Single-Leg Calf Raise',sets:3,reps:10,weight:0,rest:60}]}];
    const warmup=[['Ankle pogo','20 seconds','Stay tall and spring through the floor'],['World’s greatest stretch','4 each side','Move slowly through the full range'],['Snap-down to stick','5 reps','Land quietly and own the position']];
    const conditioning={format:'E2MOM',intervalSeconds:120,duration:12,rounds:6,movements:[['Bike sprint','12 calories'],['Lateral bound','6 each side']],pace:'Hard but repeatable · finish work inside 60 seconds',score:'Quality rounds completed'};
    const sampleWeek=window.TRAINR_SAMPLE_WEEK;
    const workoutStructure=window.TRAINR_WORKOUT_STRUCTURE;
    let workout=workoutDefaults.map(x=>({...x,substitutes:x.substitutes.map(s=>({...s}))}));
    let view='splash',history=[],navActive='today',modal=null,modalReturnSelector='',toast='',pointerX=0,teamResults=false,teamFailure=false,teamSearchQuery='Trafford',selectedCalendarDate='2026-07-14',generationStep=0,generationTimer=null,weekOffset=0,todayWeekOffset=0,todayCalendarExpanded=false,monthOffset=0,currentExercise=0,currentSet=1,loggedSets=[],restRemaining=0,restReady=false,restTimer=null,restNext=null,sessionStatus='not-started',learnQuery='',conditioningSeconds=120,conditioningRound=1,conditioningRunning=false,conditioningMovementDone=[false,false],conditioningCompleted=false,workoutStage='overview',warmupStep=0,powerSet=1,cooldownStep=0;
    const onboarding=['welcome','signup','sport','dna','team','fixtures','age','experience','teamdays','availability','gymdays','duration','equipment','goal','review'];
    const icons={today:'<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10.5V20h13v-9.5M9 20v-6h6v6"/></svg>',plan:'<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4m8-4v4M3 10h18"/></svg>',progress:'<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20V10m6 10V4m6 16v-7m4 7H2"/></svg>',learn:'<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5.5A3.5 3.5 0 0 1 7.5 2H11v18H7.5A3.5 3.5 0 0 0 4 23zM20 5.5A3.5 3.5 0 0 0 16.5 2H13v18h3.5A3.5 3.5 0 0 1 20 23z"/></svg>',profile:'<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>'};
    const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    function go(next,push=true){if(push&&view!==next)history.push(view);view=next;modal=null;toast='';render();}
    function back(){const previous=history.pop();if(previous){view=previous;modal=null;render();}}
    function header(title='',brand=false){const nested=history.length&&!brand,routeTitles={signup:'Create account',sport:'Choose sport',dna:`${scenario.sport} DNA`,team:'Find your team',fixtures:'Fixtures',age:'About you',experience:'Gym experience',teamdays:'Team training',availability:'Gym availability',gymdays:'Gym days',duration:'Training setup',equipment:'Equipment',goal:'Training goal',review:'Review profile',generation:'Season Plan',workout:'Today’s session',conditioningOverview:'Conditioning',conditioningPlayer:'Conditioning player',guided:'Guided workout',rest:'Rest',exerciseIntro:'Next exercise',guidance:'Exercise guidance',programmeSettings:'Programme settings',availabilitySettings:'Gym availability',planPreview:'Plan update'};const screenTitle=title||routeTitles[view]||'';return `<header class="header">${nested?`<button class="back compact-back" data-action="back" aria-label="Go back">←</button>`:`<span class="new-wordmark small app-wordmark" aria-label="Trainr">TRAINR.</span>`}<span class="header-title">${screenTitle}</span>${brand?`<button class="icon-button header-more" data-action="open-menu" aria-label="Open quick menu">•••</button>`:`<span class="header-spacer" aria-hidden="true"></span>`}</header>`}
    function button(label,action,variant='primary'){return `<button class="${variant}" data-action="${action}">${label}</button>`}
    function athleteAsset(sport=scenario.sport,variant='hero'){
      const type=sport==='Football'?'football':sport==='Rugby Union'?'rugby-union':sport==='Rugby League'?'rugby-league':sport==='Basketball'?'basketball':'netball';
      return `trainr-assets/campaign-v2/${type}.png`;
    }
    function trainingAsset(type='strength'){return `trainr-assets/campaign-v2/${type}.png`}
    function workoutOverviewList(){const row=(e,i)=>`<button class="exercise-row" data-exercise="${i}"><span>${String(i+1).padStart(2,'0')}</span><span><strong>${e.name}</strong><small>Rest ${formatTime(e.rest)}</small></span><strong>${e.sets} × ${e.reps}</strong></button>`;return `<section class="session-block"><div class="session-block-head"><span>01</span><div><strong>Warm-up</strong><small>Movement preparation · 8 min</small></div></div><div class="warmup-sequence">${warmup.map((x,i)=>`<div><b>${i+1}</b><span><strong>${x[0]}</strong><small>${x[1]} · ${x[2]}</small></span></div>`).join('')}</div></section><section class="session-block"><div class="session-block-head"><span>02</span><div><strong>Power</strong><small>Fast intent · 6 min</small></div></div><button class="exercise-row" data-schedule="Box Jump|4 × 4 · Rest 75 sec|Explode up, land quietly and stop each rep before quality drops."><span>P1</span><span><strong>Box Jump</strong><small>Explosive jump performance</small></span><strong>4 × 4</strong></button></section><section class="session-block"><div class="session-block-head"><span>03</span><div><strong>Primary strength</strong><small>Force production · 24 min</small></div></div>${row(workout[0],0)}${row(workout[1],1)}</section><section class="session-block grouped-block"><div class="session-block-head"><span>04</span><div><strong>Superset A · 3 rounds</strong><small>Move A1 → A2 · rest 90 sec after A2</small></div></div><div class="grouped-exercises">${row(workout[2],2)}${row(workout[3],3)}</div></section><section class="session-block conditioning-block"><div class="session-block-head"><span>05</span><div><strong>Conditioning · ${conditioning.format}</strong><small>${conditioning.duration} min · ${conditioning.rounds} rounds</small></div></div><button class="conditioning-summary" data-action="go:conditioningOverview"><span><strong>Bike sprint + lateral bound</strong><small>${conditioning.pace}</small></span><b>Open →</b></button></section><section class="session-block"><div class="session-block-head"><span>06</span><div><strong>Cooldown</strong><small>Down-regulate · 4 min</small></div></div><div class="compact-sequence">Breathing reset · Hip flexor mobility · Calf mobility</div></section>`}
    function progress(){const steps=['sport','dna','team','fixtures','age','teamdays','availability','duration','goal','review'],i=steps.indexOf(view);return i>=0?`<div class="onboarding-progress"><span>Step ${i+1} of ${steps.length}</span><div class="progress" aria-label="Onboarding progress"><i style="width:${Math.round((i+1)/steps.length*100)}%"></i></div></div>`:''}
    function nav(){return `<nav class="nav" aria-label="Main navigation">${['today','plan','progress','learn','profile'].map(x=>`<button data-nav="${x}" class="${navActive===x?'active':''}"><span class="glyph">${icons[x]}</span><span>${x[0].toUpperCase()+x.slice(1)}</span></button>`).join('')}</nav>`}
    function shell(content,{title='',brand=false,main=false,immersive=false,center=false,auth=false}={}){return `<section class="screen${immersive?' immersive':''}${center?' center':''}${auth?' auth-screen':''}">${!center?header(title,brand):''}${content}</section>${main&&!immersive?nav():''}${modal?modalHtml():''}${toast?`<div class="toast" role="status" aria-live="polite">${toast}</div>`:''}`}
    function choices(items,selected,multi=false,field=''){return `<div class="choices ${multi?'multi':''}">${items.map(item=>{const active=Array.isArray(selected)?selected.includes(item):selected===item;return `<button class="choice ${active?'selected':''}" data-choice="${esc(item)}" aria-pressed="${active}"${field?` data-field="${field}"`:''}><strong>${item}</strong></button>`}).join('')}</div>`}
    function onboardingFooter(next,label='Continue'){return `<div class="actions">${button(label,`go:${next}`)}</div><p class="swipe-hint">Swipe right to review your previous answer</p>`}
    const pathMotion=(poses,duration='4s')=>`<animate attributeName="d" dur="${duration}" repeatCount="indefinite" calcMode="spline" keyTimes="0;.42;.58;1" keySplines=".4 0 .2 1;.4 0 .2 1;.4 0 .2 1" values="${poses[0]};${poses[1]};${poses[1]};${poses[0]}"/>`;
    const valueMotion=(attribute,start,end,duration='4s')=>`<animate attributeName="${attribute}" dur="${duration}" repeatCount="indefinite" calcMode="spline" keyTimes="0;.42;.58;1" keySplines=".4 0 .2 1;.4 0 .2 1;.4 0 .2 1" values="${start};${end};${end};${start}"/>`;
    function animatedHead(start,end,duration='4s'){const [sx,sy]=start,[ex,ey]=end;return `<circle class="motion-head" cx="${sx}" cy="${sy}" r="12">${valueMotion('cx',sx,ex,duration)}${valueMotion('cy',sy,ey,duration)}</circle>`}
    function movement(){
      const exercise=workout[currentExercise]?.name||'Exercise';
      return `<div class="exercise-video-placeholder" role="group" aria-label="Written guidance available for ${esc(exercise)}"><div class="movement-symbol" aria-hidden="true">↗</div><strong>${esc(exercise)}</strong><span>Technique video coming soon</span><button type="button" data-action="guidance">Open written guidance</button></div>`;
    }
    function legacyMovement(){
      const exercise=workout[currentExercise]?.name||'Back Squat',name=exercise.toLowerCase();let figure='',caption='Side view · controlled tempo';
      if(name.includes('leg press')){
        const body=['M58 96 L82 120 L105 145 M82 120 L54 142 M105 145 L142 165 L175 145','M58 96 L82 120 L105 145 M82 120 L54 142 M105 145 L126 183 L162 198'];

        today:()=>{navActive='today';const todayItem=scheduleItemFor('2026-07-14'),hasWorkout=todayItem?.type==='STRENGTH';return shell(`<p class="eyebrow">Tuesday, 14 July</p><h1>Good morning, ${esc(scenario.name)}</h1><div class="season-banner"><span>Current season phase</span><strong>IN SEASON</strong></div><button class="today-fixture-button" data-action="fixture-detail"><span class="today-fixture"><span><span class="eyebrow">Next fixture</span><strong>${scenario.team} vs Leeds</strong><small class="muted">Saturday · Home · 11:30</small></span><strong>${fixtureCountdown()} days</strong></span></button>${todayCalendar()}${hasWorkout?`<article class="card session-card today-session athlete-session"><img src="${trainingAsset('strength')}" alt="Strength athlete training"><p class="eyebrow">${sessionStatus==='completed'?'Completed today':sessionStatus==='in-progress'?'In progress':'Today’s session'}</p><h2>${todayItem.title}</h2><p class="muted">${todayItem.durationMinutes} minutes · ${workoutStructure.length} sections</p><p class="why">${todayItem.objective}</p>${button(sessionStatus==='in-progress'?'Resume session':sessionStatus==='completed'?'View summary':'View today’s session',sessionStatus==='completed'?'go:sessionComplete':'go:workout')}</article>`:''}`,{brand:true,main:true})},
        plan:()=>{navActive='plan';const start=13+weekOffset*7,label=`${start}–${start+6} July`;return shell(`<div class="plan-week-heading"><button class="icon-button" data-action="prev-week" aria-label="Previous week">←</button><div><p class="eyebrow">IN SEASON · WEEK 3 OF 4</p><h2>${label}</h2></div><button class="icon-button" data-action="next-week" aria-label="Next week">→</button></div><div class="coach"><p class="eyebrow">Coach’s notes</p><strong>Reduce lower-body fatigue as Saturday approaches.</strong><p class="copy">Maintain strength · Court training Thursday · Freshen up Friday</p></div><div class="timeline">${renderPlanWeek()}</div>`,{brand:true,main:true})},
        progress:()=>{navActive='progress';return shell(`<div class="editorial-hero progress-hero"><img src="${athleteAsset(scenario.sport)}" alt=""><div><p class="eyebrow">Coach’s interpretation</p><h1>Your strength is moving forward.</h1><p>Lower-body strength is progressing. Conditioning consistency needs attention over the next two weeks.</p></div></div><div class="metric-strip"><div><strong>${sessionStatus==='completed'?'93':'92'}%</strong><span>Weekly adherence</span></div><div><strong>${sessionStatus==='completed'?'37':'36'}</strong><span>Sessions completed</span></div><div><strong>4</strong><span>Week consistency</span></div></div><section class="performance-panel"><div class="section-title"><span>Strength progression</span><strong>+6%</strong></div><div class="mini-chart" aria-label="Lower-body strength trend over six weeks"><i style="height:28%"></i><i style="height:38%"></i><i style="height:44%"></i><i style="height:56%"></i><i style="height:68%"></i><i style="height:82%"></i></div><div class="performance-row"><span>Trap-bar estimate</span><strong>124 kg <em>+5 kg</em></strong></div><div class="performance-row"><span>Conditioning blocks</span><strong>3 of 5 <em class="warning">Needs focus</em></strong></div></section><section class="recent-performance"><p class="eyebrow">Recent best</p><strong>Back Squat · 90 kg × 4</strong><small>Strongest completed set this block</small></section>`,{brand:true,main:true})},
        learn:()=>{navActive='learn';const matches=workout.map((e,i)=>({...e,index:i})).filter(e=>e.name.toLowerCase().includes(learnQuery.toLowerCase()));return shell(`<div class="editorial-heading"><p class="eyebrow">Performance knowledge</p><h1>Learn to move better.</h1><p class="copy">Technique, preparation and conditioning guidance for team-sport athletes.</p></div><label class="field search-field"><span>Search</span><input id="learn-search" class="input" value="${esc(learnQuery)}" placeholder="Search movements or guidance"></label><div class="learn-categories">${['Strength','Power','Landing','Speed','Lower-leg','Trunk','Shoulder','Conditioning'].map((x,i)=>`<button data-action="learn-category"><span>${['↗','⚡','↓','»','◌','◇','↻','◎'][i]}</span>${x}</button>`).join('')}</div><section class="learn-feature"><img src="${trainingAsset('split-squat')}" alt="Athlete demonstrating a split squat"><div><p class="eyebrow">Featured technique</p><h2>Own your single-leg position.</h2><button class="text-action" data-exercise="2">Open guide →</button></div></section><div class="learn-results"><p class="eyebrow">Today’s movements</p>${matches.length?matches.map((e,i)=>`<button class="exercise-row" data-exercise="${e.index}"><span>${String(i+1).padStart(2,'0')}</span><span><strong>${e.name}</strong><small>Technique · Mistakes · Substitutions</small></span><span>›</span></button>`).join(''):`<div class="empty-state"><strong>No exercises found</strong><span>Try a different movement name.</span></div>`}</div>`,{brand:true,main:true})},
        profile:()=>{navActive='profile';return shell(`<div class="profile-hero"><img src="${athleteAsset(scenario.sport)}" alt=""><div><p class="eyebrow">Athlete profile</p><h1>${esc(scenario.name)}</h1><p>${scenario.sport} · ${scenario.team}</p></div></div><div class="profile-groups"><section><p class="eyebrow">Season plan</p><button class="profile-row" data-action="go:programmeSettings"><span><strong>Programme settings</strong><small>${scenario.goal} · ${scenario.equipment}</small></span><b>›</b></button><button class="profile-row" data-action="go:availabilitySettings"><span><strong>Availability</strong><small>${scenario.gymSessions} · ${scenario.teamDays.map(x=>x.slice(0,3)).join('/') } team training</small></span><b>›</b></button></section><section><p class="eyebrow">Athlete details</p><div class="profile-row static"><span><strong>Training profile</strong><small>${scenario.age} · ${scenario.experience}</small></span></div><div class="profile-row static"><span><strong>Restrictions</strong><small>No current restrictions recorded</small></span></div></section><section><p class="eyebrow">Account</p><div class="profile-row static"><span><strong>Notifications</strong><small>Workout and fixture reminders on</small></span></div><button class="profile-row" data-action="reset"><span><strong>Restart Trafford scenario</strong><small>Reset this UAT prototype</small></span><b>›</b></button></section></div>`,{brand:true,main:true})},
        programmeSettings:()=>shell(`<p class="eyebrow">Season Plan</p><h1>Programme settings</h1><p class="copy">Changes apply only to future sessions. Completed training is preserved.</p><section class="settings-section"><h2>Training priority</h2><p class="copy">The quality Trainr prioritises across your block.</p><label class="field"><span>Primary goal</span><select class="input"><option>Build resilience</option><option>Strength</option><option>Speed</option><option>Power</option></select></label></section><section class="settings-section"><h2>Training setup</h2><label class="field"><span>Equipment</span><select class="input"><option>Commercial gym</option><option>Home gym</option><option>Limited equipment</option></select></label><label class="field"><span>Session duration</span><select class="input"><option>50–60 mins</option><option>40–50 mins</option><option>80–90 mins</option></select></label></section><section class="settings-section"><h2>Programme behaviour</h2><p class="copy">Fixture-aware adjustments remain on. You’ll preview every affected future session before saving.</p></section><div class="actions">${button('Update my Season Plan','save-profile')}${button('Cancel','back','secondary')}</div>`,{title:'Settings'}),
        availabilitySettings:()=>shell(`<p class="eyebrow">Your schedule</p><h1>Gym availability</h1><p class="copy">Trainr previews affected future sessions before changing your plan.</p><section class="settings-section"><h2>Weekly gym target</h2>${choices(['2 sessions','3 sessions','4 sessions','5 sessions'],scenario.gymSessions,false,'gymSessions')}</section><section class="settings-section"><h2>Available gym days</h2><div class="day-selector">${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map((x,i)=>`<button class="choice ${scenario.gymDays.some(d=>d.startsWith(x.slice(0,2)))?'selected':''}" data-settings-day="gym" data-day="${['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'][i]}">${x}</button>`).join('')}</div></section><section class="settings-section"><h2>Team-training days</h2><div class="day-selector">${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map((x,i)=>`<button class="choice ${scenario.teamDays.some(d=>d.startsWith(x.slice(0,2)))?'selected':''}" data-settings-day="team" data-day="${['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'][i]}">${x}</button>`).join('')}</div><p class="copy">Gym work is moved away from regular team training and Saturday fixtures.</p></section><div class="actions">${button('Preview changes','save-profile')}${button('Cancel','back','secondary')}</div>`,{title:'Availability'}),
        planPreview:()=>shell(`<p class="eyebrow">Coaching update</p><h1>Two future sessions will move.</h1><div class="plan-change"><section><p class="eyebrow">Why</p><p class="copy">Your new availability conflicts with Thursday team training.</p></section><section><p class="eyebrow">Changes</p><strong>Upper Body Strength</strong><div class="change-row"><span>Thursday</span><b class="change-arrow">→</b><span>Wednesday</span></div></section><section><strong>Recovery</strong><div class="change-row"><span>Sunday</span><b class="change-arrow">→</b><span>Monday morning</span></div></section><section><p class="eyebrow">Preserved</p><div class="preserved-list"><span>Completed sessions</span><span>Saturday fixture</span><span>Progression history</span><span>Logged performance</span></div></section></div><div class="actions">${button('Confirm update','confirm-plan-update')}${button('Keep current plan','back','secondary')}</div>`,{title:'Preview'}),
        workout:()=>shell(`<div class="workout-heading-row"><div><p class="eyebrow accent-eyebrow">TODAY’S SESSION</p><h1>Lower Body Strength</h1></div><span class="phase">${fixtureCountdown()} DAYS TO FIXTURE</span></div><div class="hero workout-art"><img src="${trainingAsset('strength')}" alt="Strength athlete training"><h2>Build force.<br>Stay fresh.</h2><p class="copy">Develop lower-body force while leaving enough freshness for Saturday’s match.</p><div class="meta"><div><strong>55 min</strong><span>Duration</span></div><div><strong>${workoutStructure.length}</strong><span>Sections</span></div></div></div><div class="exercise-list">${workoutOverviewList()}</div><div class="actions">${button(sessionStatus==='in-progress'?'Resume session':'Start session','start-workout')}</div>`,{title:''}),
        warmupPlayer:()=>shell(`${sectionProgress('warmup')}<p class="eyebrow">Warm-up · Step ${warmupStep+1} of ${warmup.length}</p><h1>Prepare to move.</h1><div class="sequence-list">${warmup.map((x,i)=>`<button class="sequence-step${i<warmupStep?' complete':''}" data-warmup-step="${i}" ${i>warmupStep?'disabled':''}><span>0${i+1}</span><span><strong>${x[0]}</strong><small>${x[1]} · ${x[2]}</small></span><span>${i<warmupStep?'✓':i===warmupStep?'Current':''}</span></button>`).join('')}</div><div class="actions">${button(warmupStep===warmup.length-1?'Complete warm-up':'Complete step','complete-warmup-step')}${button('Pause workout','pause-workout','secondary')}</div>`,{title:'Warm-up',immersive:true}),
        powerPlayer:()=>shell(`${sectionProgress('power')}<p class="eyebrow">Power · Set ${powerSet} of 4</p><h1>Box Jump</h1><div class="exercise-video-placeholder" role="group" aria-label="Written guidance for Box Jump"><div class="movement-symbol" aria-hidden="true">↑</div><strong>Box Jump</strong><span>Technique video coming soon</span></div><div class="meta"><div><strong>4</strong><span>Sets</span></div><div><strong>4</strong><span>Reps</span></div><div><strong>75 sec</strong><span>Rest</span></div></div><div class="cue"><strong>Coach’s cue:</strong> Explode up, land quietly and stop the set if jump height drops.</div><div class="actions">${button('Complete set','complete-power-set')}${button('Pause workout','pause-workout','secondary')}</div>`,{title:'Power',immersive:true}),
        conditioningOverview:()=>shell(`<p class="eyebrow">Conditioning · Repeat effort</p><h1>${conditioning.format} performance block</h1><p class="copy">Every two minutes, complete the prescribed work with repeatable quality. Use the remaining time to recover.</p><div class="conditioning-hero"><span class="format-mark">${conditioning.format}</span><div><strong>${conditioning.duration}:00</strong><small>Total time</small></div><div><strong>${conditioning.rounds}</strong><small>Rounds</small></div></div><div class="section"><p class="eyebrow">Movement order</p>${conditioning.movements.map((x,i)=>`<div class="conditioning-movement"><b>0${i+1}</b><span><strong>${x[0]}</strong><small>${x[1]}</small></span></div>`).join('')}</div><div class="coach"><p class="eyebrow">Pacing target</p><strong>${conditioning.pace}</strong><p class="copy">Score: ${conditioning.score}. Stop jumping if landing quality drops.</p></div><div class="actions">${button('Start conditioning','start-conditioning')}${button('Back to session','back','secondary')}</div>`,{title:'Conditioning'}),
        conditioningPlayer:()=>{const allDone=conditioningMovementDone.every(Boolean),elapsed=conditioning.intervalSeconds-conditioningSeconds;return shell(`${sectionProgress('conditioning')}<div class="conditioning-player"><p class="eyebrow">${conditioning.format} · Round ${conditioningRound} of ${conditioning.rounds}</p><h1>${allDone?'Recover for the next round.':'Complete before 2:00 expires.'}</h1><div class="conditioning-clock"><span>${allDone?'Recovery remaining':'Interval remaining'}</span><strong id="conditioning-time">${formatTime(conditioningSeconds)}</strong></div><div class="conditioning-sequence">${conditioning.movements.map((x,i)=>`<div class="conditioning-movement${conditioningMovementDone[i]?' complete':''}"><b>${i+1}</b><span><strong>${x[0]}</strong><small>${x[1]}</small></span><button data-action="complete-conditioning-movement" data-movement="${i}" aria-label="Mark ${x[0]} ${conditioningMovementDone[i]?'not complete':'complete'}">${conditioningMovementDone[i]?'✓':'○'}</button></div>`).join('')}</div>${allDone?`<div class="conditioning-recovery"><strong>Work complete.</strong><p class="copy">Recover for the remaining ${formatTime(conditioningSeconds)}. Round ${conditioningRound<conditioning.rounds?conditioningRound+1:conditioningRound} is next.</p></div>`:''}<div class="conditioning-next"><span>Next round</span><strong>${conditioningRound<conditioning.rounds?`Round ${conditioningRound+1} · same two movements`:'Cooldown'}</strong></div><div class="actions">${button(conditioningRunning?'Pause interval':'Start interval','toggle-conditioning')}${button('Complete round','complete-conditioning-round',allDone?'primary':'secondary')}${button('Skip round','skip-conditioning-round','secondary')}${button('End conditioning','finish-conditioning','secondary')}</div></div>`,{title:'Conditioning player',immersive:true})},
        guided:()=>{const e=workout[currentExercise],copy=exerciseCopy(e),role=exerciseRole(currentExercise),stage=currentExercise<2?'strength':'superset';return shell(`${sectionProgress(stage)}<div class="guided-top"><p class="eyebrow">${role.section}</p><button class="text-action" data-action="pause-workout">Pause</button></div><div class="guided-context"><span>${role.role}</span><span>${role.group}</span></div>${currentExercise>=2?`<p class="guided-round">Round ${currentSet} of 3 · ${currentExercise===2?'A1':'A2'}</p>`:''}<h1>${e.name}</h1>${movement()}${e.substituted?`<p class="substitution-note">Prescription adjusted for this exercise. Your round position is preserved.</p>`:''}<div class="meta"><div><strong>${e.sets}</strong><span>${currentExercise>=2?'Rounds':'Sets'}</span></div><div><strong>${e.reps}</strong><span>Reps</span></div><div><strong>RPE ${role.rpe}</strong><span>Target</span></div><div><strong>${formatTime(currentExercise>=2?90:e.rest)}</strong><span>${currentExercise===2?'After A2':'Rest'}</span></div></div><div class="cue"><strong>Coach’s cue:</strong> ${copy.cue}</div><div class="previous"><span>Previous performance</span><strong>${e.substituted?'No previous record':`${e.weight-2.5} kg × ${e.reps}`}</strong></div><div class="logger"><label><span>Weight</span><input id="log-weight" type="number" value="${e.weight}"></label><label><span>Reps</span><input id="log-reps" type="number" value="${e.reps}"></label></div>${currentExercise>=2?`<div class="next-movement"><span>${currentExercise===2?'Next movement':'After this movement'}</span><strong>${currentExercise===2?workout[3].name:currentSet<3?'Rest 90 sec, then A1':'Conditioning'}</strong></div>`:''}<div class="actions">${button('Complete set','complete-set')}${button('Exercise guidance','guidance','secondary')}${button('Substitute exercise','substitute','secondary')}</div>`,{title:'Guided workout',immersive:true})},
        rest:()=>{const e=workout[currentExercise],context=restNext?.type==='power'?`Box Jump · Set ${powerSet} of 4`:restNext?.type?.startsWith('superset')?`Superset A · Round ${currentSet} complete`:`${e.name} · Set ${currentSet} of ${e.sets}`;return shell(`<p class="eyebrow">${restReady?'Recovery complete':'Work logged'}</p><h1>${restReady?'Ready for your next effort':'Recover for your next effort'}</h1><div class="timer${restReady?' ready':''}"><strong id="timer-value">${formatTime(restRemaining)}</strong></div><p class="copy center-copy">${context}</p><div class="actions">${button('Continue','finish-rest')}${button('+30 seconds','add-rest','secondary')}${button('Skip rest','finish-rest','secondary')}</div>`,{title:'Rest timer',immersive:true})},
        exerciseIntro:()=>{const e=workout[currentExercise],copy=exerciseCopy(e),role=exerciseRole(currentExercise);return shell(`${sectionProgress(currentExercise<2?'strength':'superset')}<p class="eyebrow">Up next · ${role.role}</p><h1>${e.name}</h1>${movement()}<div class="hero"><p class="eyebrow">Prescription</p><h2>${e.sets} ${currentExercise>=2?'rounds':'sets'} × ${e.reps} reps</h2><p class="copy">${currentExercise>=2?'Complete A1 then A2 before resting 90 seconds.':`Rest ${formatTime(e.rest)} between sets.`} ${copy.cue}</p></div><div class="actions">${button('Start exercise','go:guided')}${button('Exercise guidance','guidance','secondary')}</div>`,{title:'Next exercise',immersive:true})},
        cooldownPlayer:()=>{const cooldown=[['Breathing reset','60 seconds'],['Hip flexor mobility','45 seconds each side'],['Calf mobility','45 seconds each side']];return shell(`${sectionProgress('cooldown')}<p class="eyebrow">Cooldown · Step ${cooldownStep+1} of ${cooldown.length}</p><h1>Bring the system down.</h1><div class="sequence-list">${cooldown.map((x,i)=>`<button class="sequence-step${i<cooldownStep?' complete':''}" ${i>cooldownStep?'disabled':''}><span>0${i+1}</span><span><strong>${x[0]}</strong><small>${x[1]}</small></span><span>${i<cooldownStep?'✓':i===cooldownStep?'Current':''}</span></button>`).join('')}</div><div class="actions">${button(cooldownStep===cooldown.length-1?'Complete session':'Complete step','complete-cooldown-step')}${button('Pause workout','pause-workout','secondary')}</div>`,{title:'Cooldown',immersive:true})},
        guidance:()=>{const e=workout[currentExercise]||workout[0],copy=exerciseCopy(e);return shell(`<p class="eyebrow">Exercise guidance</p><h1>${e.name}</h1>${movement()}<div class="section"><h2>Technique</h2><p class="copy">${copy.technique}</p></div><div class="section"><h2>Common mistakes</h2><p class="copy">${copy.mistakes}</p></div><div class="actions">${button('Back to workout','back')}</div>`,{title:'Guidance',immersive:true})},
        sessionComplete:()=>shell(`<div class="completion-scene"><img src="${trainingAsset('strength')}" alt=""><div class="complete-mark">✓</div><p class="eyebrow">Lower Body Strength · Complete</p><h1>Quality work banked.</h1><p>Force work completed without compromising freshness for Saturday.</p></div><div class="completion-metrics"><div><strong>55 min</strong><span>Duration</span></div><div><strong>${loggedSets.length} / ${workout.reduce((a,x)=>a+x.sets,0)}</strong><span>Strength sets</span></div><div><strong>4 days</strong><span>To fixture</span></div></div><div class="coach completion-note"><p class="eyebrow">Coach’s note</p><strong>Exactly the stimulus we needed.</strong><p class="copy">Thursday is team training. Friday stays light so you arrive ready for Leeds.</p></div><div class="actions">${button('Back to Today','go:today')}</div>`,{center:true})
      };
      app.innerHTML=(views[view]||views.today)();
      bind();
      app.querySelectorAll('.today-session img,.workout-art img,.generation-scene img,.result-scene img,.progress-hero img,.profile-hero img,.completion-scene img').forEach(img=>img.alt='');
      const dnaImage=app.querySelector('.dna-hero img');if(dnaImage)dnaImage.alt=`${scenario.sport} player performing an explosive sport-specific movement`;
      const learnImage=app.querySelector('.learn-feature img');if(learnImage)learnImage.alt='Player demonstrating a controlled rear-foot elevated split squat';
      if(modal){const dialog=app.querySelector('.modal');dialog?.setAttribute('role','dialog');dialog?.setAttribute('aria-modal','true');dialog?.setAttribute('aria-label',dialog.querySelector('h2')?.textContent||'Trainr dialog');requestAnimationFrame(()=>dialog?.querySelector('input,select,button')?.focus())}
      if(view==='rest')startRestTimer();
      if(view==='conditioningPlayer'&&conditioningRunning)startConditioningTimer();
    }
    function modalHtml(){
      if(modal.type==='fixture'){const f=fixtures[modal.index]||{date:'',opponent:'',home:'Home',time:'',venue:'',competition:'',selected:true};return `<div class="modal-backdrop"><div class="modal"><h2>${modal.index<fixtures.length?'Edit fixture':'Add fixture'}</h2><label class="field"><span>Date</span><input id="m-date" class="input" value="${esc(f.date)}"></label><label class="field"><span>Opponent</span><input id="m-opponent" class="input" value="${esc(f.opponent)}"></label><label class="field"><span>Home or away</span><select id="m-home" class="input"><option ${f.home==='Home'?'selected':''}>Home</option><option ${f.home==='Away'?'selected':''}>Away</option></select></label><label class="field"><span>Time</span><input id="m-time" class="input" value="${esc(f.time)}"></label><label class="field"><span>Venue (optional)</span><input id="m-venue" class="input" value="${esc(f.venue)}"></label><label class="field"><span>Competition (optional)</span><input id="m-competition" class="input" value="${esc(f.competition||'')}"></label><div class="actions">${button('Save fixture','save-fixture')}${button('Cancel','close-modal','secondary')}</div></div></div>`}
      if(modal.type==='substitute'){const e=workout[currentExercise];return `<div class="modal-backdrop"><div class="modal"><p class="eyebrow">Same training intent</p><h2>Substitute ${e.name}</h2><p class="copy">Each option includes its own load, repetitions and recovery prescription.</p><div class="stack section">${e.substitutes.map((x,i)=>`<button class="secondary substitute-option" data-substitute="${i}"><strong>${x.name}</strong><small>${x.sets} × ${x.reps} · Rest ${formatTime(x.rest)}</small></button>`).join('')}</div><div class="actions">${button('Cancel','close-modal','secondary')}</div></div></div>`}
      if(modal.type==='pause')return `<div class="modal-backdrop"><div class="modal"><p class="eyebrow">Workout paused</p><h2>Your completed sets are saved.</h2><p class="copy">Resume when ready or end the session as unfinished.</p><div class="actions">${button('Resume workout','close-modal')}${button('End and save','abandon-workout','danger')}</div></div></div>`;
      if(modal.type==='abandoned')return `<div class="modal-backdrop"><div class="modal"><p class="eyebrow">Session saved</p><h2>Workout unfinished</h2><p class="copy">${loggedSets.length} completed sets have been kept. Trainr will not alter the week until you review it.</p><div class="actions">${button('Return to Today','go:today')}</div></div></div>`;
      if(modal.type==='menu')return `<div class="modal-backdrop"><div class="modal"><p class="eyebrow">Quick menu</p><h2>What would you like to open?</h2><div class="actions">${button('Profile','go:profile')}${button('Programme settings','go:programmeSettings','secondary')}${button('Close','close-modal','secondary')}</div></div></div>`;
      if(modal.type==='fixtureDetail')return `<div class="modal-backdrop"><div class="modal"><p class="eyebrow">Next fixture · 4 days</p><h2>Trafford vs Leeds</h2><p class="copy">Saturday 18 July · 11:30<br>Trafford Sports Centre</p><div class="coach"><p class="eyebrow">Plan impact</p><strong>Training volume reduces as match day approaches.</strong><p class="copy">Your final lower-body session is today, followed by team training and recovery.</p></div><div class="actions">${button('View weekly plan','go:plan')}${button('Close','close-modal','secondary')}</div></div></div>`;
      if(modal.type==='schedule')return `<div class="modal-backdrop"><div class="modal"><p class="eyebrow">Season Plan</p><h2>${esc(modal.title)}</h2><p class="muted">${esc(modal.meta)}</p><p class="copy">${esc(modal.description)}</p><div class="actions">${button('Close','close-modal')}</div></div></div>`;
      return '';
    }
    function bind(){
      app.querySelectorAll('[data-action]').forEach(el=>el.addEventListener('click',()=>action(el.dataset.action,el)));
      app.querySelectorAll('[data-nav]').forEach(el=>el.addEventListener('click',()=>{history=[];go(el.dataset.nav,false)}));
      app.querySelectorAll('[data-choice]').forEach(el=>el.addEventListener('click',()=>{const multi=el.parentElement.classList.contains('multi'),value=el.dataset.choice,fields={sport:'sport',age:'age',experience:'experience',availability:'gymSessions',duration:'duration',equipment:'equipment',goal:'goal'},field=el.dataset.field||fields[view];if(multi){el.classList.toggle('selected');el.setAttribute('aria-pressed',String(el.classList.contains('selected')));const selected=[...el.parentElement.querySelectorAll('.choice.selected')].map(x=>x.dataset.choice);if(field==='teamDays'||view==='teamdays')scenario.teamDays=selected;if(field==='gymDays'||view==='gymdays')scenario.gymDays=selected}else{el.parentElement.querySelectorAll('.choice,.sport-card').forEach(x=>{x.classList.remove('selected');x.setAttribute('aria-pressed','false')});el.classList.add('selected');el.setAttribute('aria-pressed','true');if(field)scenario[field]=value}}));
      app.querySelectorAll('[data-edit-fixture]').forEach(el=>el.addEventListener('click',()=>{modalReturnSelector=`[data-edit-fixture="${el.dataset.editFixture}"]`;modal={type:'fixture',index:Number(el.dataset.editFixture)};render()}));
      app.querySelectorAll('[data-fixture-check]').forEach(el=>el.addEventListener('change',()=>{fixtures[Number(el.dataset.fixtureCheck)].selected=el.checked}));
      app.querySelectorAll('[data-exercise]').forEach(el=>el.addEventListener('click',()=>{currentExercise=Number(el.dataset.exercise);go('guidance')}));
      app.querySelectorAll('[data-substitute]').forEach(el=>el.addEventListener('click',()=>{const current=workout[currentExercise],replacement=current.substitutes[Number(el.dataset.substitute)],preservedRound=currentSet;workout[currentExercise]={...current,...replacement,substituted:true,substitutes:current.substitutes};currentSet=preservedRound;modal=null;toast='Prescription adjusted for '+replacement.name;render();setTimeout(()=>{toast='';render()},1800)}));
      app.querySelectorAll('[data-schedule]').forEach(el=>el.addEventListener('click',()=>{const [title,meta,description]=el.dataset.schedule.split('|');modalReturnSelector=`[data-schedule="${CSS.escape(el.dataset.schedule)}"]`;modal={type:'schedule',title,meta,description};render()}));
      app.querySelectorAll('[data-action="schedule-item"]').forEach(el=>el.addEventListener('click',()=>{const item=sampleWeek.find(x=>x.id===el.dataset.scheduleId);if(item){modal={type:'schedule',title:item.title,meta:item.durationMinutes?`${item.durationMinutes} min`:item.startTime||item.type.replaceAll('_',' '),description:item.type==='TEAM_TRAINING'?'Regular team training. Gym loading has been adjusted around it.':item.type==='RECOVERY'?'A short recovery session placed before the fixture.':'No planned training today.'};render()}}));
      app.querySelectorAll('[data-settings-day]').forEach(el=>el.addEventListener('click',()=>{const list=el.dataset.settingsDay==='team'?scenario.teamDays:scenario.gymDays,day=el.dataset.day,index=list.indexOf(day);if(index>=0)list.splice(index,1);else list.push(day);render()}));
      const learnSearch=app.querySelector('#learn-search');if(learnSearch)learnSearch.addEventListener('input',e=>{learnQuery=e.target.value;render();const next=app.querySelector('#learn-search');if(next){next.focus();next.setSelectionRange(learnQuery.length,learnQuery.length)}});
      const teamSearch=app.querySelector('#team-search');if(teamSearch)teamSearch.addEventListener('keydown',e=>{if(e.key==='Enter')action('search-team',teamSearch)});
      const screen=app.querySelector('.screen');if(screen&&onboarding.includes(view)){screen.addEventListener('pointerdown',e=>pointerX=e.clientX);screen.addEventListener('pointerup',e=>{const dx=e.clientX-pointerX;if(Math.abs(dx)<60)return;const i=onboarding.indexOf(view);if(dx>0&&i>0)back()})}
    }
    function action(name,el){
      if(name==='back'){back();return}if(name==='reset'){history=[];view='splash';sessionStatus='not-started';loggedSets=[];currentExercise=0;currentSet=1;workoutStage='overview';warmupStep=0;powerSet=1;cooldownStep=0;conditioningCompleted=false;conditioningMovementDone=[false,false];learnQuery='';teamSearchQuery='Trafford';selectedCalendarDate='2026-07-14';teamResults=false;teamFailure=false;Object.assign(scenario,scenarioDefaults,{teamDays:[...scenarioDefaults.teamDays],gymDays:[...scenarioDefaults.gymDays]});workout=workoutDefaults.map(x=>({...x,substitutes:x.substitutes.map(s=>({...s}))}));render();return}if(view==='signup'&&name==='go:sport'){scenario.name=app.querySelector('#signup-name').value.trim()||'Athlete';scenario.email=app.querySelector('#signup-email').value.trim()}if(name.startsWith('go:')){if(view==='teamdays'&&!scenario.teamDays.length){toast='Choose at least one team-training day';render();return}if((view==='gymdays'||view==='availability')&&!scenario.gymDays.length){toast='Choose at least one available gym day';render();return}go(name.slice(3));return}
      if(name==='open-menu'){modalReturnSelector='[data-action="open-menu"]';modal={type:'menu'};render();return}if(name==='fixture-detail'){modalReturnSelector='[data-action="fixture-detail"]';modal={type:'fixtureDetail'};render();return}
      if(name==='learn-category'){toast=`${el.textContent.trim()} collection selected`;render();setTimeout(()=>{toast='';render()},1200);return}
      if(name==='toggle-calendar'){todayCalendarExpanded=!todayCalendarExpanded;render();return}if(name==='prev-today-week'){todayWeekOffset--;selectedCalendarDate=dateKey(new Date(2026,6,13+todayWeekOffset*7));render();return}if(name==='next-today-week'){todayWeekOffset++;selectedCalendarDate=dateKey(new Date(2026,6,13+todayWeekOffset*7));render();return}if(name==='prev-month'){monthOffset--;selectedCalendarDate=dateKey(new Date(2026,6+monthOffset,1));render();return}if(name==='next-month'){monthOffset++;selectedCalendarDate=dateKey(new Date(2026,6+monthOffset,1));render();return}if(name==='calendar-select'){selectedCalendarDate=el.dataset.calendarDate;render();return}
      if(name==='save-profile'){go('planPreview');return}if(name==='confirm-plan-update'){history=[];go('plan',false);toast='Season Plan updated';render();setTimeout(()=>{toast='';render()},1400);return}
      if(name==='search-team'){teamSearchQuery=app.querySelector('#team-search').value.trim();teamFailure=teamSearchQuery.length<2;teamResults=!teamFailure;if(teamResults&&!teamCandidates().some(x=>x.name===scenario.team))scenario.team=teamCandidates()[0].name;render();return}
      if(name==='team-error'){teamResults=false;teamFailure=true;render();return}if(name==='retry-team'){teamFailure=false;teamResults=true;render();return}if(name==='select-team'){scenario.team=el.dataset.team||el.querySelector('strong')?.textContent||scenario.team;render();return}
      if(name==='add-fixture'){modalReturnSelector='[data-action="add-fixture"]';modal={type:'fixture',index:fixtures.length};render();return}if(name==='save-fixture'){const f={date:app.querySelector('#m-date').value,opponent:app.querySelector('#m-opponent').value,home:app.querySelector('#m-home').value,time:app.querySelector('#m-time').value,venue:app.querySelector('#m-venue').value,competition:app.querySelector('#m-competition').value,selected:true};if(modal.index<fixtures.length)fixtures[modal.index]={...fixtures[modal.index],...f};else fixtures.push(f);modal=null;toast='Fixture saved';render();setTimeout(()=>{toast='';render()},1200);return}if(name==='close-modal'){const returnTo=modalReturnSelector;modal=null;modalReturnSelector='';render();if(returnTo)requestAnimationFrame(()=>app.querySelector(returnTo)?.focus());return}
      if(name==='start-generation'){generationStep=0;go('generation');clearInterval(generationTimer);generationTimer=setInterval(()=>{generationStep++;if(generationStep>=4){clearInterval(generationTimer);setTimeout(()=>go('generationSuccess'),450)}else render()},650);return}if(name==='generation-fail'){clearInterval(generationTimer);go('generationError');return}
      if(name==='prev-week'){weekOffset=Math.max(-1,weekOffset-1);render();return}if(name==='next-week'){weekOffset=Math.min(1,weekOffset+1);render();return}
      if(name==='start-workout'){if(sessionStatus==='completed'){go('sessionComplete');return}if(sessionStatus==='abandoned'){loggedSets=[];currentExercise=0;currentSet=1;workoutStage='warmup';warmupStep=0;powerSet=1;cooldownStep=0;conditioningCompleted=false;workout=workoutDefaults.map(x=>({...x,substitutes:x.substitutes.map(s=>({...s}))}))}sessionStatus='in-progress';if(workoutStage==='overview')workoutStage='warmup';go(workoutStage==='warmup'?'warmupPlayer':workoutStage==='power'?'powerPlayer':workoutStage==='conditioning'?'conditioningOverview':workoutStage==='cooldown'?'cooldownPlayer':'guided');return}if(name==='guidance'){go('guidance');return}if(name==='substitute'){modalReturnSelector='[data-action="substitute"]';modal={type:'substitute'};render();return}if(name==='pause-workout'){modalReturnSelector='[data-action="pause-workout"]';modal={type:'pause'};render();return}if(name==='abandon-workout'){sessionStatus='abandoned';modal={type:'abandoned'};render();return}
      if(name==='complete-warmup-step'){if(warmupStep<warmup.length-1){warmupStep++;render()}else{workoutStage='power';powerSet=1;go('powerPlayer')}return}if(name==='complete-power-set'){if(powerSet<4){restRemaining=75;restReady=false;restNext={type:'power'};go('rest')}else{workoutStage='strength';currentExercise=0;currentSet=1;go('exerciseIntro')}return}
      if(name==='start-conditioning'){conditioningSeconds=conditioning.intervalSeconds;conditioningRound=1;conditioningRunning=false;conditioningMovementDone=[false,false];conditioningCompleted=false;workoutStage='conditioning';go('conditioningPlayer');return}if(name==='toggle-conditioning'){conditioningRunning=!conditioningRunning;render();return}if(name==='complete-conditioning-movement'){const i=Number(el.dataset.movement);conditioningMovementDone[i]=!conditioningMovementDone[i];render();return}if(name==='complete-conditioning-round'&&!conditioningMovementDone.every(Boolean)){toast='Complete both movements or choose Skip round';render();setTimeout(()=>{toast='';render()},1500);return}if(name==='complete-conditioning-round'||name==='skip-conditioning-round'){conditioningRunning=false;if(conditioningRound>=conditioning.rounds){conditioningCompleted=true;workoutStage='cooldown';cooldownStep=0;go('cooldownPlayer');return}conditioningRound++;conditioningSeconds=conditioning.intervalSeconds;conditioningMovementDone=[false,false];render();return}if(name==='finish-conditioning'){conditioningRunning=false;go('workout');return}
      if(name==='complete-cooldown-step'){if(cooldownStep<2){cooldownStep++;render()}else{sessionStatus='completed';workoutStage='complete';go('sessionComplete')}return}
      if(name==='complete-set'){const e=workout[currentExercise],entry={exercise:e.name,exerciseId:currentExercise,round:currentExercise>=2?currentSet:null,set:currentExercise<2?currentSet:null,weight:Number(app.querySelector('#log-weight').value),reps:Number(app.querySelector('#log-reps').value),complete:true};loggedSets.push(entry);if(currentExercise>=2){if(currentExercise===2){currentExercise=3;go('guided');return}restRemaining=90;restReady=false;restNext=currentSet<3?{type:'superset',round:currentSet+1}:{type:'superset-finish'};go('rest');return}const finalSet=currentSet>=e.sets;if(finalSet){currentExercise++;currentSet=1;go('exerciseIntro');return}restRemaining=e.rest;restReady=false;restNext={type:'straight'};go('rest');return}if(name==='finish-rest'){advanceWorkout();return}if(name==='add-rest'){restRemaining+=30;restReady=false;render();return}
    }
    function startRestTimer(){if(restReady)return;const value=app.querySelector('#timer-value');restTimer=setInterval(()=>{restRemaining=Math.max(0,restRemaining-1);if(value)value.textContent=formatTime(restRemaining);if(restRemaining===0){clearInterval(restTimer);restReady=true;if(navigator.vibrate)navigator.vibrate(200);render()}},1000)}
    function startConditioningTimer(){const value=app.querySelector('#conditioning-time');restTimer=setInterval(()=>{conditioningSeconds=Math.max(0,conditioningSeconds-1);if(value)value.textContent=formatTime(conditioningSeconds);if(conditioningSeconds===0){clearInterval(restTimer);conditioningRunning=false;if(navigator.vibrate)navigator.vibrate(160);render()}},1000)}
    function advanceWorkout(){clearInterval(restTimer);restReady=false;if(restNext?.type==='power'){powerSet++;restNext=null;go('powerPlayer');return}if(restNext?.type==='superset'){currentSet=restNext.round;currentExercise=2;restNext=null;go('guided');return}if(restNext?.type==='superset-finish'){restNext=null;workoutStage='conditioning';go('conditioningOverview');return}currentSet++;restNext=null;go('guided')}
    document.addEventListener('keydown',event=>{if(event.key==='Escape'&&modal){event.preventDefault();action('close-modal');return}if(event.key==='Tab'&&modal){const controls=[...app.querySelectorAll('.modal button:not([disabled]),.modal input:not([disabled]),.modal select:not([disabled]),.modal textarea:not([disabled])')].filter(el=>el.offsetParent!==null);if(!controls.length)return;const first=controls[0],last=controls[controls.length-1];if(event.shiftKey&&document.activeElement===first){event.preventDefault();last.focus()}else if(!event.shiftKey&&document.activeElement===last){event.preventDefault();first.focus()}}});
    render();
  })();
  </script>
</body>
